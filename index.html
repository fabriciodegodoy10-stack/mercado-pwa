<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#EC407A">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Lista Mercado">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="description" content="Inicializador PWA da Lista de Mercado compartilhada.">
    <title>Lista de Mercado</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
    <style>
      :root {
        --bg: #FFF9F7;
        --text: #1F2937;
        --muted: #64748B;
        --pink: #EC407A;
        --pink-soft: #FCE4EC;
        --blue: #4A90E2;
        --blue-soft: #EAF3FF;
        --yellow: #F9B934;
        --yellow-soft: #FFF6D8;
        --line: #E2E8F0;
        --shadow: 0 22px 52px rgba(31, 41, 55, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 22px;
        background:
          radial-gradient(circle at 20% 18%, var(--pink-soft) 0 88px, transparent 90px),
          radial-gradient(circle at 82% 16%, var(--blue-soft) 0 96px, transparent 98px),
          radial-gradient(circle at 78% 82%, var(--yellow-soft) 0 116px, transparent 118px),
          var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }

      .launcher {
        width: min(430px, 100%);
        padding: 28px;
        border: 1px solid rgba(226, 232, 240, 0.92);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.84);
        box-shadow: var(--shadow);
        text-align: center;
        backdrop-filter: blur(12px);
      }

      .icon-wrap {
        width: 112px;
        height: 112px;
        display: grid;
        place-items: center;
        margin: 0 auto 18px;
        border-radius: 30px;
        background: #ffffff;
        box-shadow: 0 14px 28px rgba(236, 64, 122, 0.18);
      }

      .icon-wrap img {
        width: 88px;
        height: 88px;
        display: block;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 7vw, 2.35rem);
        line-height: 1.04;
      }

      p {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.5;
      }

      .progress {
        position: relative;
        height: 10px;
        margin: 24px 0 18px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--blue-soft);
      }

      .progress::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 42%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--pink), var(--yellow));
        animation: loading 1.15s ease-in-out infinite;
      }

      .open-button {
        width: 100%;
        min-height: 50px;
        border: 0;
        border-radius: 12px;
        background: var(--pink);
        color: #ffffff;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 12px 22px rgba(236, 64, 122, 0.22);
      }

      .hint {
        min-height: 20px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      @keyframes loading {
        0% {
          transform: translateX(-110%);
        }

        100% {
          transform: translateX(250%);
        }
      }
    </style>
  </head>
  <body>
    <main class="launcher">
      <div class="icon-wrap" aria-hidden="true">
        <img src="./icon-192.png" alt="">
      </div>
      <h1>Lista de Mercado</h1>
      <p id="statusText">Instale este app na tela inicial. Quando abrir pelo ícone, sua lista entra automaticamente.</p>
      <div class="progress" aria-hidden="true"></div>
      <button class="open-button" id="openAppButton" type="button">Abrir aplicativo</button>
      <div class="hint" id="hint">No Chrome, toque nos três pontinhos e escolha Instalar aplicativo.</div>
    </main>

    <script>
      const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxYuO0Bz5ckQYw9YDTNKUo4PaBv0TOjxfbaB3ROCIXChKh29J7XlT-3eVqTNdxLJZXoLQ/exec';
      const openButton = document.getElementById('openAppButton');
      const hint = document.getElementById('hint');
      const statusText = document.getElementById('statusText');
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

      function openAppsScript() {
        if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'COLOCAREI_AQUI_O_LINK_DO_APPS_SCRIPT') {
          hint.textContent = 'Cole a URL do Apps Script no arquivo index.html antes de publicar.';
          return;
        }

        window.location.replace(APPS_SCRIPT_URL);
      }

      openButton.addEventListener('click', openAppsScript);

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js').catch(error => {
            console.warn('Service worker nao registrado:', error);
          });
        });
      }

      if (isStandalone) {
        statusText.textContent = 'Abrindo sua lista compartilhada...';
        hint.textContent = 'Se nada acontecer, toque em Abrir aplicativo.';
        window.setTimeout(openAppsScript, 150);
      }
    </script>
  </body>
</html>
